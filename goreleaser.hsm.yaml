version: 2

project_name: bao

builds:
  - id: builds-hsm
    tags:
      - ui
      - hsm
    ldflags:
      - -X github.com/openbao/openbao/version.fullVersion={{ .Version }} -X github.com/openbao/openbao/version.GitCommit={{ .Commit }} -X github.com/openbao/openbao/version.CommitDate={{ .Date }} -X github.com/openbao/openbao/version.VersionMetadata=hsm
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "amd64"}}CC=x86_64-linux-gnu-gcc{{- end}}
        {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
      - goos: dragonfly
      - goos: freebsd
      - goos: illumos
      - goos: netbsd
      - goos: openbsd
      - goos: wasip1
      - goos: windows
      - goos: linux
        goarch: arm
      - goos: linux
        goarch: ppc64le
      - goos: linux
        goarch: s390x
      - goos: linux
        goarch: riscv
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false

report_sizes: true

nfpms:
  - vendor: OpenBao
    package_name: openbao-hsm
    homepage: https://openbao.org
    maintainer: OpenBao <openbao@lists.openssf.org>
    description: |
      OpenBao exists to provide a software solution to manage, store, and distribute
      sensitive data including secrets, certificates, and keys.
    license: MPL-2.0
    formats:
      - deb
      - rpm
      - archlinux
    dependencies:
      - openssl
    provides:
      - openbao
    conflicts:
      - openbao
      - bao
      - bao-hsm
    replaces:
      - bao-hsm
    bindir: /usr/bin
    section: default
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/openbao/copyright
        file_info:
          mode: 0644
      - src: ./.release/linux/package/etc/openbao/openbao.env
        dst: /etc/openbao/openbao.env
        type: config|noreplace
        file_info:
          mode: 0644
      - src: ./.release/linux/package/etc/openbao/openbao.hcl
        dst: /etc/openbao/openbao.hcl
        type: config|noreplace
        file_info:
          mode: 0644
      - src: ./.release/linux/package/usr/lib/systemd/system/openbao.service
        dst: /usr/lib/systemd/system/openbao.service
        type: config|noreplace
        file_info:
          mode: 0644
    scripts:
      preinstall: ".release/linux/preinst"
      postinstall: ".release/linux/postinst"
      postremove: ".release/linux/postrm"
    overrides:
      deb:
        dependencies:
          - openssl
      rpm:
        dependencies:
          - openssl
      archlinux:
        dependencies:
          - openssl
    deb:
      signature:
        key_file: "{{ .Env.GPG_KEY_FILE }}"
    rpm:
      signature:
        key_file: "{{ .Env.GPG_KEY_FILE }}"

checksum:
  disable: true

changelog:
  disable: true

archives:
  - format_overrides:
      - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}-hsm_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
    builds_info:
      group: root
      owner: root
      mode: 0755
      # format is `time.RFC3339Nano`
      mtime: 2008-01-02T15:04:05Z

sboms:
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package

signs:
  - id: cosign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}" # needed on cosign 3.0.0+
      - "${artifact}"
      - "--yes" # needed on cosign 2.0.0+
  - id: gpg
    artifacts: all
    signature: "${artifact}.gpgsig"
    cmd: gpg
    stdin: "{{ .Env.GPG_PASSWORD }}"
    args:
      - "--batch"
      - "--default-key={{ .Env.GPG_FINGERPRINT }}"
      - "--output=${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: true
  disable: false
  prerelease: auto
  use_existing_draft: true
  replace_existing_artifacts: true
  github:
    name: "{{ base .Env.GITHUB_REPOSITORY }}"
    owner: "{{ dir .Env.GITHUB_REPOSITORY }}"
