version: 2

project_name: openbao

builds:
  - id: builds-other
    binary: bao
    tags:
      - ui
    ldflags:
      - -X github.com/openbao/openbao/v2/internal/version.fullVersion={{.Version}} -X github.com/openbao/openbao/v2/internal/version.GitCommit={{.Commit}} -X github.com/openbao/openbao/v2/internal/version.CommitDate={{ .Date }}
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false

report_sizes: true

checksum:
  disable: true

changelog:
  disable: true

archives:
  - format_overrides:
      - formats: tar.gz
      # Use zip for windows archives.
      - goos: windows
        formats: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
    builds_info:
      group: root
      owner: root
      mode: 0755
      # format is `time.RFC3339Nano`
      mtime: 2008-01-02T15:04:05Z

sboms:
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package

signs:
  - id: cosign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}" # needed on cosign 3.0.0+
      - "${artifact}"
      - "--yes" # needed on cosign 2.0.0+
  - id: gpg
    artifacts: all
    signature: "${artifact}.gpgsig"
    cmd: gpg
    stdin: "{{ .Env.GPG_PASSWORD }}"
    args:
      - "--batch"
      - "--default-key={{ .Env.GPG_FINGERPRINT }}"
      - "--output=${signature}"
      - "--detach-sign"
      - "${artifact}"
