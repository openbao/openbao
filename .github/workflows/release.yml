# Creates a GitHub release in draft state, including artifacts to be published.
# Review artifacts and publish the draft release to trigger further release
# workflows (release-images.yml, release-packages.yml). Preselect the correct
# branch before running this workflow!

name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g., v2.0.0. Ignored if nightly is enabled.
        required: false
        type: string
      nightly:
        description: Is this a nightly release?
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-slim
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Refuse nightly release on main repository
        if: github.repository == 'openbao/openbao' && inputs.nightly
        run: echo '::error::Refusing to run nightly release on main repo' && exit 1

      - name: Refuse regular release on nightly repository
        if: github.repository == 'openbao/openbao-nightly' && !inputs.nightly
        run: echo '::error::Refusing to run regular release on nightly repo' && exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          if [[ "$NIGHTLY_RELEASE" == 'false' ]]; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT" && exit
          fi

          # Locally remove previous nightly tags so they do not interfere with
          # nightly tag computation. Also add the upstream.
          git remote add upstream https://github.com/openbao/openbao
          git fetch --all
          for tag in $(git tag); do
            if [[ "$tag" == *nightly* ]]; then
              echo "Deleting $tag"
              git tag --delete "$tag"
            fi
          done

          # Then generate a nightly tag for this commit.
          echo "version=$(./scripts/nightly_tag.sh)" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}
          NIGHTLY_RELEASE: ${{ inputs.nightly }}

      - name: Refuse versions that do not start with 'v'
        if: "!startsWith(steps.version.outputs.version, 'v')"
        run: echo "::error::Version '$VERSION' must start with a 'v'" && exit 1
        env:
          VERSION: ${{ steps.version.outputs.version }}

      # Avoid creating the initial release resource via GoReleaser to stop
      # parallel runs from racing against each other and creating multiple
      # releases.
      - name: Create draft release
        run: |
          gh release create "$VERSION" \
            --draft \
            --repo="$GITHUB_REPOSITORY" \
            --title="$VERSION" \
            --target="$GITHUB_SHA" \
            --prerelease="$PRERELEASE"
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ inputs.nightly || contains(steps.version.outputs.version, '-') }}
          GH_TOKEN: ${{ github.token }}

      - name: Upload GPG signing key
        if: github.repository == 'openbao/openbao'
        run: gh release upload "$VERSION" website/public/assets/openbao-gpg-pub-20240618.asc
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs:
      - setup
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ui/package.json

      - name: Set up PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: ui/package.json

      - name: Set up UI cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: http/web_ui/
          key: ${{ github.ref }}-ui

      - name: Build UI
        run: make static-dist

  build:
    name: Build ${{ matrix.target.os }}/${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    needs:
      - setup
      - build-ui
    permissions:
      contents: write
      id-token: write
    env:
      SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES: "true"
      SYFT_GOLANG_SEARCH_REMOTE_LICENSES: "true"
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: amd64       }
          - { os: linux,   arch: arm, arm: 6 }
          - { os: linux,   arch: arm64       }
          - { os: linux,   arch: ppc64le     }
          - { os: linux,   arch: riscv64     }
          - { os: linux,   arch: s390x       }
          - { os: hsm,     arch: amd64       }
          - { os: hsm,     arch: arm64       }
          - { os: darwin,  arch: amd64       }
          - { os: darwin,  arch: arm64       }
          - { os: freebsd, arch: amd64       }
          - { os: freebsd, arch: arm64       }
          - { os: freebsd, arch: arm, arm: 6 }
          - { os: netbsd,  arch: amd64       }
          - { os: netbsd,  arch: arm64       }
          - { os: netbsd,  arch: arm, arm: 6 }
          - { os: openbsd, arch: amd64       }
          - { os: openbsd, arch: arm64       }
          - { os: openbsd, arch: arm, arm: 6 }
          - { os: windows, arch: amd64       }
          - { os: windows, arch: arm64       }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Required by GoReleaser.

      - name: Set up Go
        uses: ./.github/actions/set-up-go

      - name: Set up UI cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: http/web_ui/
          key: ${{ github.ref }}-ui

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          install-only: true
          version: v2.16.0

      - name: Import GPG key
        id: gpg-import
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSWORD }}

      # This is required for GoReleaser's 'nfpms' stage.
      - name: Save GPG key to disk
        run: |
          GPG_KEY_FILE=$(mktemp)
          echo "$GPG_PRIVATE_KEY" > "$GPG_KEY_FILE"
          echo "GPG_KEY_FILE=${GPG_KEY_FILE}" >> "$GITHUB_ENV"
        env:
          GPG_TTY: /dev/ttys000 # Set the GPG_TTY to avoid issues with pinentry.
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Install C compiler for arm64 CGO cross-compilation
        if: matrix.target.os == 'hsm' && matrix.target.arch == 'arm64'
        run: sudo apt install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        run: |
          # Pick the right file:
          file='goreleaser.${{ matrix.target.os }}.yaml'
          [[ ! -f "$file" ]] && file=goreleaser.other.yaml

          # Inject 'goos' and 'goarch':
          query='
              .builds[0].goos   |= ["${{ case(matrix.target.os == 'hsm', 'linux', matrix.target.os) }}"]
            | .builds[0].goarch |= ["${{ matrix.target.arch }}"]
          '

          # Inject 'goarm' if defined:
          if [[ ! -z '${{ matrix.target.arm }}' ]]; then
            query="$query"' | .builds[0].goarm |= ["${{ matrix.target.arm }}"]'
          fi

          # Create the tag locally so goreleaser knows what to target:
          git tag "$VERSION"

          # Ship it:
          yq eval "$query" "$file" | goreleaser release --clean --verbose --timeout=30m -f -
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg-import.outputs.fingerprint }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          NFPM_DEFAULT_PASSPHRASE: ${{ secrets.GPG_PASSWORD }}

      - name: Remove GPG key from disk
        if: always()
        run: rm -f "$GPG_KEY_FILE"

  build-dist:
    name: Build distribution source tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - setup
      - build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: ./.github/actions/set-up-go

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ui/package.json

      - name: Set up PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: ui/package.json

      - name: Make LICENSE_NODE_MODULES.txt
        run: |
          pnpm install
          pnpx generate-license-file --input package.json --output ../LICENSE_NODE_MODULES.txt
        working-directory: ui

      - name: Make SPDX_NODE_MODULES.txt
        run: |
          jq -r .license ui/node_modules/*/package.json | \
            grep -v url | \
            sed 's/.*"type": "//;s/",//' | \
            grep -v { | grep -v } | grep -v ^null$ | \
            awk '{if ((($2 == "OR") || ($2 == "AND")) && (substr($1, 0, 1) != "(")) { print "(" $0 ")"} else {print $0}}' | \
            sort -u > SPDX_NODE_MODULES.txt

      - name: Make VERSION_NODE_MODULES.txt
        run: jq -r '"\(.name) \(.version)"' ui/node_modules/*/package.json > VERSION_NODE_MODULES.txt

      - name: Make LICENSE_DEPENDENCIES.md
        run: |
          go tool -modfile=tools/go.mod go-licenses report ./... \
            --ignore github.com/openbao/openbao \
            --template LICENSE_DEPENDENCIES.tpl \
            > LICENSE_DEPENDENCIES.md

      - name: Vendor Go modules
        run: go mod vendor

      - name: Make distribution source tarball
        run: |
          tar --exclude .git --exclude '*.gz' --exclude node_modules --exclude .pnpm-store -cJf ../openbao-dist-$VERSION.tar.xz --xform="s,^\.,openbao-dist-$VERSION," .
          mv ../*.xz .
        env:
          VERSION: ${{ needs.setup.outputs.version }}

      - name: Upload distribution source tarball
        run: gh release upload "$VERSION" *.xz
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
