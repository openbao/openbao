version: "2"
linters:
  enable:
    - cyclop
    - misspell
  settings:
    cyclop:
      # Lower cyclomatic complexity threshold after the max complexity is lowered.
      # Highest: (*ServerCommand).Run (126) in internal/command/server.go
      max-complexity: 126
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: github.com/openbao/openbao
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
