version: 2

project_name: bao

builds:
  - id: builds-other
    tags:
      - ui
    ldflags:
      - -X github.com/openbao/openbao/version.fullVersion={{.Version}} -X github.com/openbao/openbao/version.GitCommit={{.Commit}} -X github.com/openbao/openbao/version.CommitDate={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - freebsd
      - netbsd
      - openbsd
      - windows
    goarch:
      - amd64
      - arm
      - arm64
      - riscv64
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: linux
      - goos: illumos
      - goos: solaris
      - goos: darwin
        goarm: "6"
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: riscv64
      - goos: dragonfly
        goarch: arm
      - goos: dragonfly
        goarch: arm64
      - goos: dragonfly
        goarch: riscv64
      - goos: freebsd
        goarm: "7"
      - goos: netbsd
        goarch: riscv64
      - goos: netbsd
        goarm: "7"
      - goos: openbsd
        goarch: riscv64
      - goos: openbsd
        goarm: "7"
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: riscv64
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false

report_sizes: true

checksum:
  disable: true

changelog:
  disable: true

archives:
  - format_overrides:
      - formats: tar.gz
      # Use zip for windows archives.
      - goos: windows
        formats: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
    builds_info:
      group: root
      owner: root
      mode: 0755
      # format is `time.RFC3339Nano`
      mtime: 2008-01-02T15:04:05Z

sboms:
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package

signs:
  - id: cosign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}" # needed on cosign 3.0.0+
      - "${artifact}"
      - "--yes" # needed on cosign 2.0.0+
  - id: gpg
    artifacts: all
    signature: "${artifact}.gpgsig"
    cmd: gpg
    stdin: "{{ .Env.GPG_PASSWORD }}"
    args:
      - "--batch"
      - "--default-key={{ .Env.GPG_FINGERPRINT }}"
      - "--output=${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  prerelease: auto
  disable: false

  draft: false
  replace_existing_draft: false
  replace_existing_artifacts: false
  github:
    name: "{{ base .Env.GITHUB_REPOSITORY }}"
    owner: "{{ dir .Env.GITHUB_REPOSITORY }}"
