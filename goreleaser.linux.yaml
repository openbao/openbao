version: 2

project_name: bao

builds:
  - id: builds-linux
    tags:
      - ui
    ldflags:
      - -X github.com/openbao/openbao/version.fullVersion={{ .Version }} -X github.com/openbao/openbao/version.GitCommit={{ .Commit }} -X github.com/openbao/openbao/version.CommitDate={{ .Date }}
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false
report_sizes: true

nfpms:
  - vendor: OpenBao
    package_name: openbao
    homepage: https://openbao.org
    maintainer: OpenBao <openbao@lists.openssf.org>
    description: |
      OpenBao exists to provide a software solution to manage, store, and distribute
      sensitive data including secrets, certificates, and keys.
    license: MPL-2.0
    formats:
      - deb
      - rpm
      - archlinux
    dependencies:
      - openssl
    provides:
      - openbao
    conflicts:
      - bao
      - bao-hsm
    replaces:
      - bao
    bindir: /usr/bin
    section: default
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/openbao/copyright
        file_info:
          mode: 0644
      - src: ./.release/linux/package/etc/openbao/openbao.env
        dst: /etc/openbao/openbao.env
        type: config|noreplace
        file_info:
          mode: 0644
      - src: ./.release/linux/package/etc/openbao/openbao.hcl
        dst: /etc/openbao/openbao.hcl
        type: config|noreplace
        file_info:
          mode: 0644
      - src: ./.release/linux/package/usr/lib/systemd/system/openbao.service
        dst: /usr/lib/systemd/system/openbao.service
        type: config|noreplace
        file_info:
          mode: 0644
    scripts:
      preinstall: ".release/linux/preinst"
      postinstall: ".release/linux/postinst"
      postremove: ".release/linux/postrm"
    overrides:
      deb:
        dependencies:
          - openssl
      rpm:
        dependencies:
          - openssl
      archlinux:
        dependencies:
          - openssl
    deb:
      signature:
        key_file: "{{ .Env.GPG_KEY_FILE }}"
    rpm:
      signature:
        key_file: "{{ .Env.GPG_KEY_FILE }}"

checksum:
  disable: true

changelog:
  disable: true

archives:
  - format_overrides:
      - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - "LICENSE"
      - "README.md"
      - "CHANGELOG.md"
    builds_info:
      group: root
      owner: root
      mode: 0755
      # format is `time.RFC3339Nano`
      mtime: 2008-01-02T15:04:05Z

sboms:
  - id: archive
    artifacts: archive
  - id: package
    artifacts: package

signs:
  - id: cosign
    artifacts: all
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}" # needed on cosign 3.0.0+
      - "${artifact}"
      - "--yes" # needed on cosign 2.0.0+
  - id: gpg
    artifacts: all
    signature: "${artifact}.gpgsig"
    cmd: gpg
    stdin: "{{ .Env.GPG_PASSWORD }}"
    args:
      - "--batch"
      - "--default-key={{ .Env.GPG_FINGERPRINT }}"
      - "--output=${signature}"
      - "--detach-sign"
      - "${artifact}"
