name: cross-platform-build
on:
  workflow_call:
    inputs:
      matrix:
        description: "JSON string for the platform matrix (from generate-platform-matrix.sh)"
        required: true
        type: string
      ui-artifact-name:
        description: "Artifact name containing prepared http/web_ui assets"
        required: false
        default: ""
        type: string

jobs:
  build:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Require UI artifact for UI-tagged builds
        if: ${{ contains(matrix.build_tags, 'ui') && inputs.ui-artifact-name == '' }}
        run: |
          echo "ui-artifact-name is required when matrix.build_tags contains ui" >&2
          exit 1

      - name: Download UI assets
        if: ${{ contains(matrix.build_tags, 'ui') && inputs.ui-artifact-name != '' }}
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ inputs.ui-artifact-name }}
          path: .

      - name: Set up cross compile
        if: ${{ matrix.buildx != true }}
        uses: ./.github/actions/set-up-cross-compile
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goarm: ${{ matrix.goarm }}

      - name: Build binary (native)
        if: ${{ matrix.buildx != true }}
        id: native
        env:
          BUILD_TAGS: ${{ matrix.build_tags }}
        run: ./.github/scripts/cross-compile-binary.sh

      - name: Upload artifact (native)
        if: ${{ matrix.buildx != true }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bao-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.native.outputs.out }}

      - name: Set up QEMU
        if: ${{ matrix.buildx == true }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ matrix.buildx == true }}
        uses: docker/setup-buildx-action@v3

      - name: Build binary (buildx)
        if: ${{ matrix.buildx == true }}
        id: buildx
        env:
          MATRIX_GOARCH: ${{ matrix.goarch }}
          MATRIX_GOARM: ${{ matrix.goarm }}
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          TARGET_GOARM: ${{ matrix.goarm }}
          BUILD_TAGS: ${{ matrix.build_tags }}
        run: |
          platform="linux/${MATRIX_GOARCH}"
          if [[ "$MATRIX_GOARCH" == "arm" && -n "$MATRIX_GOARM" ]]; then
            platform="${platform}/v${MATRIX_GOARM}"
          fi

          docker buildx build \
            --platform="$platform" \
            --file .github/docker/Dockerfile.cross \
            --build-arg GO_VERSION="$(cat .go-version)" \
            --build-arg GOOS="${TARGET_GOOS}" \
            --build-arg GOARCH="${TARGET_GOARCH}" \
            --build-arg GOARM="${TARGET_GOARM}" \
            --build-arg BUILD_TAGS="${BUILD_TAGS}" \
            --output=type=local,dest=out \
            --progress=plain \
            .

      - name: Upload artifact (buildx)
        if: ${{ matrix.buildx == true }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bao-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/bao
