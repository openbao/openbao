rules:
  - id: use-test-context
    patterns:
      - pattern-either:
        - pattern: context.Background
        - pattern: context.TODO
    message: "Use (t/b).Context() in tests!"
    languages: [go]
    severity: ERROR
    paths:
      include:
        - "*_test.go"
